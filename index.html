<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --gold:#D4AF37;--gold2:#F5E6A3;--gold3:#B8960C;--dk:#0A0A0F;--dk2:#1A1425;
      --green:#2ECC71;--red:#E74C3C;--blue:#3498DB;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      background:linear-gradient(160deg,var(--dk),var(--dk2) 40%,#0D0D15);
      color:#fff;
      font-family:Tahoma,Arial,sans-serif;
      padding:20px;
    }
    .wrap{max-width:1100px;margin:auto}
    .card{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:18px;
      margin-bottom:14px;
      box-shadow:0 10px 30px rgba(0,0,0,.15);
    }
    .title{
      text-align:center;
      color:var(--gold);
      font-size:40px;
      font-weight:700;
      margin-bottom:18px;
    }
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .col{flex:1;min-width:260px}
    input,select,button{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:none;
      font-size:15px;
    }
    input,select{
      background:rgba(255,255,255,.06);
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
      margin-bottom:10px;
      outline:none;
    }
    input::placeholder{color:rgba(255,255,255,.45)}
    button{cursor:pointer;font-weight:700}
    .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold3));color:#111}
    .btn-dark{background:rgba(255,255,255,.07);color:#fff;border:1px solid rgba(255,255,255,.08)}
    .btn-green{background:linear-gradient(135deg,var(--green),#27AE60);color:#fff}
    .btn-red{background:var(--red);color:#fff}
    .tabs{display:flex;gap:8px;margin-bottom:14px}
    .tab{flex:1}
    .hidden{display:none !important}
    .small{font-size:12px;opacity:.7}
    .customer{
      padding:14px;
      border-radius:14px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      margin-bottom:10px;
    }
    .customer-top{
      display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
    }
    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:20px;
      font-size:12px;
      background:rgba(212,175,55,.12);
      color:var(--gold);
      border:1px solid rgba(212,175,55,.25);
    }
    .badge.green{
      background:rgba(46,204,113,.14);
      color:#7ef0a7;
      border-color:rgba(46,204,113,.3);
    }
    .stamps{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
    .stamp{
      width:30px;height:30px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:bold;
      background:rgba(255,255,255,.08);color:#999;
      border:1px dashed rgba(255,255,255,.18);
    }
    .stamp.on{
      background:linear-gradient(135deg,var(--gold),var(--gold3));
      color:#111;border:1px solid var(--gold);
    }
    .section-title{
      color:var(--gold);
      margin-bottom:10px;
      font-size:22px;
      font-weight:700;
    }
    .topbar{
      display:flex;justify-content:space-between;align-items:center;gap:10px;
      margin-bottom:14px;flex-wrap:wrap;
    }
    .muted{opacity:.75}
    #msg{
      margin:12px 0 0;
      padding:12px 14px;
      border-radius:12px;
      display:none;
      font-size:14px;
    }
    #msg.ok{display:block;background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.3);color:#8ff0b3}
    #msg.err{display:block;background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);color:#ffb3aa}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .actions button{flex:1;min-width:140px}
    .empty{
      text-align:center;
      padding:24px;
      opacity:.6;
    }
  </style>
</head>
<body>
<div class="wrap">

  <div id="loginPage" class="card">
    <div class="title">لوحة التحكم</div>

    <div class="tabs">
      <button class="btn-gold tab" id="adminTabBtn" onclick="setMode('admin')">🔐 مشرف</button>
      <button class="btn-dark tab" id="empTabBtn" onclick="setMode('emp')">👤 موظف</button>
    </div>

    <div id="adminLogin">
      <div class="row">
        <div class="col">
          <input type="password" id="adminPin" placeholder="رمز المشرف">
        </div>
      </div>
      <button class="btn-gold" onclick="loginAdmin()">دخول كمشرف</button>
    </div>

    <div id="empLogin" class="hidden">
      <div class="row">
        <div class="col"><input id="empName" placeholder="اسم الموظف"></div>
        <div class="col"><input type="password" id="empPin" placeholder="رمز الموظف"></div>
      </div>
      <button class="btn-green" onclick="loginEmployee()">دخول كموظف</button>
      <div class="small" style="margin-top:8px">لازم يكون الموظف موجود في جدول employees</div>
    </div>

    <div id="msg"></div>
  </div>

  <div id="panelPage" class="hidden">
    <div class="topbar">
      <div>
        <div class="title" style="text-align:right;font-size:28px;margin-bottom:6px">متجر الولاء</div>
        <div class="muted" id="sessionInfo"></div>
      </div>
      <button class="btn-red" style="width:auto;padding:12px 18px" onclick="logout()">خروج</button>
    </div>

    <div class="row">
      <div class="col card">
        <div class="section-title">إضافة عميل</div>
        <input id="newName" placeholder="اسم العميل">
        <input id="newPhone" placeholder="رقم الهاتف">
        <input id="newBirthday" type="date">
        <select id="newBranch">
          <option value="riyadh">فرع الرياض</option>
          <option value="dammam">فرع الدمام</option>
          <option value="truck_riyadh">ترك الرياض</option>
        </select>
        <button class="btn-gold" onclick="addCustomer()">إضافة العميل</button>
      </div>

      <div class="col card" id="employeesBox">
        <div class="section-title">إضافة موظف</div>
        <input id="addEmpName" placeholder="اسم الموظف">
        <input id="addEmpPin" placeholder="رمز الموظف">
        <select id="addEmpBranch">
          <option value="riyadh">فرع الرياض</option>
          <option value="dammam">فرع الدمام</option>
          <option value="truck_riyadh">ترك الرياض</option>
        </select>
        <button class="btn-green" onclick="addEmployee()">إضافة موظف</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">العملاء</div>
      <input id="searchInput" placeholder="بحث بالاسم أو الهاتف" oninput="renderCustomers()">
      <div id="customersList"></div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://zmkfwwqngpnmkxkluwat.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2Tl1LmF_xC6DxXbm_cYwCA_UrBN_W8I';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let mode = 'admin';
let isAdmin = false;
let currentEmployee = null;
let customers = [];

function showMsg(text, type='ok'){
  const box = document.getElementById('msg');
  box.className = type === 'err' ? 'err' : 'ok';
  box.textContent = text;
}

function clearMsg(){
  const box = document.getElementById('msg');
  box.className = '';
  box.style.display = 'none';
  box.textContent = '';
}

function normalizeStamps(val){
  if (Array.isArray(val)) return val;
  if (typeof val === 'string') {
    try {
      const parsed = JSON.parse(val);
      if (Array.isArray(parsed)) return parsed;
    } catch(e){}
  }
  return [false,false,false,false,false];
}

function setMode(newMode){
  mode = newMode;
  document.getElementById('adminLogin').classList.toggle('hidden', newMode !== 'admin');
  document.getElementById('empLogin').classList.toggle('hidden', newMode !== 'emp');
  document.getElementById('adminTabBtn').className = newMode === 'admin' ? 'btn-gold tab' : 'btn-dark tab';
  document.getElementById('empTabBtn').className = newMode === 'emp' ? 'btn-green tab' : 'btn-dark tab';
  clearMsg();
}

function logout(){
  isAdmin = false;
  currentEmployee = null;
  customers = [];
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('panelPage').classList.add('hidden');
  clearMsg();
}

function enterPanel(){
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('panelPage').classList.remove('hidden');
  document.getElementById('employeesBox').classList.toggle('hidden', !isAdmin);
  document.getElementById('sessionInfo').textContent = isAdmin
    ? 'مسجل كمشرف'
    : `مسجل كموظف: ${currentEmployee.name} - ${branchLabel(currentEmployee.branch)}`;
  loadCustomers();
}

function branchLabel(branch){
  const map = {
    riyadh:'فرع الرياض',
    dammam:'فرع الدمام',
    truck_riyadh:'ترك الرياض'
  };
  return map[branch] || branch || '-';
}

function loginAdmin(){
  const pin = document.getElementById('adminPin').value.trim();
  if (pin !== '1234') {
    showMsg('رمز المشرف غير صحيح', 'err');
    return;
  }
  isAdmin = true;
  currentEmployee = null;
  enterPanel();
}

async function loginEmployee(){
  const name = document.getElementById('empName').value.trim();
  const pin = document.getElementById('empPin').value.trim();

  if (!name || !pin) {
    showMsg('اكتب اسم الموظف والرمز', 'err');
    return;
  }

  const { data, error } = await db
    .from('employees')
    .select('*')
    .eq('name', name)
    .eq('pin', pin)
    .limit(1);

  if (error) {
    showMsg('مشكلة في قراءة جدول الموظفين: ' + error.message, 'err');
    return;
  }

  if (!data || !data.length) {
    showMsg('بيانات الموظف غير صحيحة أو الموظف غير موجود', 'err');
    return;
  }

  isAdmin = false;
  currentEmployee = data[0];
  enterPanel();
}

async function loadCustomers(){
  let query = db.from('customers').select('*').order('created_at', { ascending: false });

  if (!isAdmin && currentEmployee?.branch) {
    query = query.eq('branch', currentEmployee.branch);
  }

  const { data, error } = await query;

  if (error) {
    alert('خطأ في تحميل العملاء: ' + error.message);
    return;
  }

  customers = data || [];
  renderCustomers();
}

function renderCustomers(){
  const q = (document.getElementById('searchInput')?.value || '').trim();
  const list = document.getElementById('customersList');

  const filtered = customers.filter(c =>
    (c.name || '').includes(q) || (c.phone || '').includes(q)
  );

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">لا يوجد عملاء</div>';
    return;
  }

  list.innerHTML = filtered.map(c => {
    const stamps = normalizeStamps(c.stamps);
    const done = stamps.filter(Boolean).length;
    const rewards = Number(c.total_rewards || 0);

    return `
      <div class="customer">
        <div class="customer-top">
          <div>
            <div style="font-size:18px;font-weight:700">${c.name || '-'}</div>
            <div class="small">${c.phone || '-'} | ${branchLabel(c.branch)}</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <div class="badge">${done}/5 أختام</div>
            <div class="badge green">🎁 ${rewards} هدايا</div>
          </div>
        </div>

        <div class="stamps">
          ${stamps.map((s,i) => `<div class="stamp ${s ? 'on':''}">${s ? '✓' : i+1}</div>`).join('')}
        </div>

        <div class="actions">
          <button class="btn-gold" onclick="addStamp('${String(c.phone).replace(/'/g,"\\'")}')">+ إضافة ختم</button>
          <button class="btn-dark" onclick="resetCard('${String(c.phone).replace(/'/g,"\\'")}')">تصفير البطاقة</button>
        </div>
      </div>
    `;
  }).join('');
}

async function addCustomer(){
  const name = document.getElementById('newName').value.trim();
  const phone = document.getElementById('newPhone').value.trim();
  const birthday = document.getElementById('newBirthday').value || null;
  const branch = isAdmin ? document.getElementById('newBranch').value : (currentEmployee?.branch || 'riyadh');

  if (!name || !phone) {
    alert('اكتب الاسم ورقم الهاتف');
    return;
  }

  const payload = {
    name,
    phone,
    birthday,
    branch,
    stamps: [false,false,false,false,false],
    total_rewards: 0
  };

  const { error } = await db.from('customers').insert([payload]);

  if (error) {
    alert('فشل إضافة العميل: ' + error.message);
    return;
  }

  document.getElementById('newName').value = '';
  document.getElementById('newPhone').value = '';
  document.getElementById('newBirthday').value = '';
  alert('تم إضافة العميل');
  loadCustomers();
}

async function addStamp(phone){
  const customer = customers.find(c => String(c.phone) === String(phone));
  if (!customer) return;

  let stamps = normalizeStamps(customer.stamps);
  const idx = stamps.findIndex(x => !x);

  if (idx === -1) {
    alert('البطاقة مكتملة بالفعل');
    return;
  }

  stamps[idx] = true;

  let totalRewards = Number(customer.total_rewards || 0);
  if (idx === 4) totalRewards += 1;

  const { error } = await db
    .from('customers')
    .update({
      stamps,
      total_rewards: totalRewards
    })
    .eq('phone', phone);

  if (error) {
    alert('فشل إضافة الختم: ' + error.message);
    return;
  }

  alert(idx === 4 ? 'تمت إضافة الختم الأخير وحُسبت هدية 🎉' : 'تمت إضافة ختم');
  loadCustomers();
}

async function resetCard(phone){
  const { error } = await db
    .from('customers')
    .update({
      stamps: [false,false,false,false,false]
    })
    .eq('phone', phone);

  if (error) {
    alert('فشل تصفير البطاقة: ' + error.message);
    return;
  }

  alert('تم تصفير البطاقة');
  loadCustomers();
}

async function addEmployee(){
  if (!isAdmin) return;

  const name = document.getElementById('addEmpName').value.trim();
  const pin = document.getElementById('addEmpPin').value.trim();
  const branch = document.getElementById('addEmpBranch').value;

  if (!name || !pin) {
    alert('اكتب اسم الموظف والرمز');
    return;
  }

  const { error } = await db
    .from('employees')
    .insert([{ name, pin, branch }]);

  if (error) {
    alert('فشل إضافة الموظف: ' + error.message);
    return;
  }

  document.getElementById('addEmpName').value = '';
  document.getElementById('addEmpPin').value = '';
  alert('تم إضافة الموظف');
}

setMode('admin');
</script>
</body>
</html>
