<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

  <style>
    :root{
      --gold:#D4AF37;--gold2:#F5E6A3;--gold3:#B8960C;--dk:#0A0A0F;--dk2:#1A1425;--dk3:#140F23;
      --grn:#2ECC71;--red:#E74C3C;--blue:#3498DB;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:linear-gradient(160deg,var(--dk),var(--dk2) 40%,#0D0D15);font-family:'Tajawal',sans-serif;color:#fff;overflow-x:hidden}
    .bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 20% 20%,rgba(212,175,55,.06),transparent 50%),radial-gradient(circle at 80% 80%,rgba(212,175,55,.04),transparent 50%)}
    @keyframes slideUp{from{transform:translateY(25px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes popIn{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
    @keyframes scanMove{0%,100%{top:10%}50%{top:85%}}

    .page{display:none;flex-direction:column;align-items:center;padding:20px 14px;min-height:100vh;position:relative;z-index:1}
    .page.active{display:flex;animation:slideUp .4s ease}

    .btn{width:100%;padding:14px;border-radius:16px;border:none;font-size:16px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
    .btn:active{transform:scale(.97)}
    .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold3));color:var(--dk);box-shadow:0 4px 16px rgba(212,175,55,.25)}

    .btn-green{background:linear-gradient(135deg,var(--grn),#27AE60);color:#fff}
    .btn-red{background:var(--red);color:#fff}
    .btn-sm{width:auto;padding:10px 18px;font-size:13px}
    .back-btn{background:none;border:none;color:rgba(255,255,255,.5);font-size:14px;font-family:'Tajawal',sans-serif;cursor:pointer;align-self:flex-start;margin-bottom:16px}

    .form-wrap{display:flex;flex-direction:column;align-items:center;width:100%;max-width:380px;justify-content:center;min-height:70vh}
    .form-title{font-family:'Noto Kufi Arabic',sans-serif;font-size:22px;font-weight:700;color:var(--gold);margin-bottom:24px}
    .field{width:100%;margin-bottom:14px}
    .field label{font-size:13px;color:rgba(255,255,255,.5);display:block;margin-bottom:6px}
    .field input,.field textarea,.field select{width:100%;padding:13px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:15px;font-family:'Tajawal',sans-serif}

    .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;border-radius:10px;border:none;background:transparent;color:rgba(255,255,255,.4);font-family:'Tajawal',sans-serif;cursor:pointer;font-size:9px;font-weight:600}

    .sc{background:rgba(255,255,255,.03);border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,.06);margin-bottom:12px;width:100%}

    .c-row{display:flex;justify-content:space-between;align-items:center;padding:12px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);margin-bottom:8px;flex-wrap:wrap;gap:8px}
    .r-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0}

    .sm-icon{padding:4px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:transparent;font-size:13px;cursor:pointer;color:#fff}

    .chip{padding:6px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);font-size:11px;font-family:'Tajawal',sans-serif;cursor:pointer;white-space:nowrap}

    .chart{display:flex;justify-content:space-between;align-items:flex-end;height:120px;gap:4px;padding-top:8px}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
    .bar{min-height:4px;width:100%;background:linear-gradient(180deg,var(--gold),var(--gold3));border-radius:6px 6px 0 0;display:flex;align-items:flex-start;justify-content:center;transition:height .5s}
    .bar-n{font-size:10px;font-weight:700;color:var(--dk2);margin-top:2px}
    .bar-d{font-size:10px;color:rgba(255,255,255,.3);margin-top:6px}

    .scan-frame{width:100%;aspect-ratio:1.1;border-radius:20px;background:rgba(0,0,0,.4);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;max-height:340px;margin-bottom:16px;padding:12px}
    .scan-corner{position:absolute;width:40px;height:40px;border-top:3px solid var(--gold);border-right:3px solid var(--gold)}
    .scan-line{position:absolute;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);box-shadow:0 0 12px rgba(212,175,55,.5);animation:scanMove 2.5s ease-in-out infinite}
    .scan-card{width:100%;padding:20px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.2);margin-top:16px;animation:popIn .3s ease}
    .scan-dots{display:flex;justify-content:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .scan-dot{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:rgba(255,255,255,.25)}

    .alert{border-radius:16px;padding:14px;margin-bottom:12px}
    .alert-bd{background:rgba(255,183,77,.08);border:1px solid rgba(255,183,77,.2)}
    .alert-chip{font-size:12px;padding:4px 10px;border-radius:8px;display:inline-block;margin-left:4px;margin-bottom:4px}

    .method-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);font-family:'Tajawal',sans-serif;color:rgba(255,255,255,.5);cursor:pointer}
    .method-btn.on{background:rgba(212,175,55,.1);border-color:rgba(212,175,55,.3);color:var(--gold)}
    .tmp-btn{width:100%;display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);margin-bottom:6px;font-family:'Tajawal',sans-serif;cursor:pointer;text-align:right;color:#fff}

    .fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--gold),var(--gold3));color:var(--dk2);font-size:28px;font-weight:300;box-shadow:0 6px 24px rgba(212,175,55,.4);z-index:10;cursor:pointer;display:none}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;color:#fff;font-size:14px;font-weight:600;z-index:200;font-family:'Tajawal',sans-serif;box-shadow:0 4px 20px rgba(0,0,0,.3);display:none}
    .toast.show{display:block;animation:popIn .3s ease}
    .empty{display:flex;flex-direction:column;align-items:center;padding:40px 20px;color:rgba(255,255,255,.3);gap:8px}
    .divider{display:flex;align-items:center;gap:12px;width:100%;margin:16px 0}
    .divider span{font-size:12px;color:rgba(255,255,255,.25);white-space:nowrap}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
    #reader{width:100%;max-width:320px;overflow:hidden;border-radius:18px}
    #reader video{border-radius:18px}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:rgba(212,175,55,.2);border-radius:4px}
  </style>
</head>

<script>
const SUPABASE_URL = 'https://zmkfwwqngpnmkxkluwat.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2Tl1LmF_xC6DxXbm_cYwCA_UrBN_W8I';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_PIN = '7788';
const BRANCHES = {
  riyadh: { name: "فرع الرياض", icon: "🏢", color: "#D4AF37" },
  dammam: { name: "فرع الدمام", icon: "🏬", color: "#3498DB" },
  truck_riyadh: { name: "ترك الرياض", icon: "🚚", color: "#E74C3C" }
};

let isAdmin = false;
let currentEmp = null;
let currentBranch = "riyadh";
let activeTab = "dashboard";
let shopName = "متجر الولاء";
let scanResult = null;
let msgMethod = "whatsapp";
let html5QrScanner = null;
let appSettings = {
  whatsapp_enabled: true,
  whatsapp_method: 'queue',
  whatsapp_endpoint: ''
};

function toast(msg, type='success'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'error' ? '#E74C3C' : '#2ECC71';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function go(page){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-' + page);
  if (el) {
    el.classList.add('active');
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'slideUp .4s ease';
  }
}

function daysSince(d){ return d ? Math.floor((Date.now() - new Date(d).getTime()) / 864e5) : 999; }
function getLastVisit(c){ return c.history?.length ? c.history[c.history.length - 1].date : c.created_at; }
function isActive(c){ return daysSince(getLastVisit(c)) <= 14; }
function fmt(d){ return d ? new Date(d).toLocaleDateString('ar-SA', { month: 'short', day: 'numeric' }) : '-'; }
function fmtT(d){ return d ? new Date(d).toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' }) : ''; }
function fmtBD(bd){ return bd ? new Date(bd).toLocaleDateString('ar-SA', { month: 'long', day: 'numeric' }) : '-'; }

function getTier(c){
  const v = (c.history || []).filter(h => h.action === 'stamp').length;
  if (v >= 20) return { name: 'ذهبي', icon: '👑', color: '#FFD700' };
  if (v >= 10) return { name: 'فضي', icon: '🥈', color: '#C0C0C0' };
  return { name: 'برونزي', icon: '🥉', color: '#CD7F32' };
}

function normalizeStamps(val){
  if (Array.isArray(val)) return val;
  if (typeof val === 'string') {
    try {
      const parsed = JSON.parse(val);
      if (Array.isArray(parsed)) return parsed;
    } catch(e){}
  }
  return [false,false,false,false,false];
}

function normalizeCustomer(c){
  return {
    ...c,
    stamps: normalizeStamps(c.stamps),
    history: Array.isArray(c.history) ? c.history : []
  };
}

function normalizePhone(phone){
  if (!phone) return '';

  let p = String(phone).trim();
  const arNums = '٠١٢٣٤٥٦٧٨٩';
  p = p.replace(/[٠-٩]/g, d => arNums.indexOf(d));
  p = p.replace(/\D/g, '');

  if (p.startsWith('966')) {
    p = '0' + p.slice(3);
  }

  if (p.startsWith('5') && p.length === 9) {
    p = '0' + p;
  }

  return p;
}

async function findCustomerByPhone(phone){
  const normalized = normalizePhone(phone);

  const variants = [...new Set([
    normalized,
    normalized.replace(/^0/, '966'),
    normalized.replace(/^0/, ''),
    '+' + normalized.replace(/^0/, '966')
  ])].filter(Boolean);

  const { data, error } = await db
    .from('customers')
    .select('*')
    .in('phone', variants)
    .limit(1);

  if (error) throw error;

  return data && data.length ? normalizeCustomer(data[0]) : null;
}

function isBDToday(c){
  if (!c.birthday) return false;
  const t = new Date(), b = new Date(c.birthday);
  return b.getMonth() === t.getMonth() && b.getDate() === t.getDate();
}

function isBDWeek(c){
  if (!c.birthday) return false;
  const t = new Date(), b = new Date(c.birthday);
  for (let i = 0; i < 7; i++) {
    const d = new Date(t);
    d.setDate(d.getDate() + i);
    if (b.getMonth() === d.getMonth() && b.getDate() === d.getDate()) return true;
  }
  return false;
}

function isBDMonth(c){
  if (!c.birthday) return false;
  return new Date(c.birthday).getMonth() === new Date().getMonth();
}

async function saveNotif(type, to_user, message, count = 1){
  try {
    await db.from('loyalty_notifications').insert([{ type, to_user, message, count }]);
  } catch(e) {
    console.error('saveNotif error', e);
  }
}

async function loadAppSettings(){
  try {
    const { data, error } = await db.from('app_settings').select('*').eq('id', 1).single();
    if (error) return;
    if (data) {
      appSettings = {
        whatsapp_enabled: data.whatsapp_enabled ?? true,
        whatsapp_method: data.whatsapp_method || 'queue',
        whatsapp_endpoint: data.whatsapp_endpoint || ''
      };
    }
  } catch (e) {
    console.error('loadAppSettings error', e);
  }
}

async function saveWASettings(){
  try {
    const whatsapp_enabled = document.getElementById('wa-enabled').checked;
    const whatsapp_method = document.getElementById('wa-method').value;
    const whatsapp_endpoint = document.getElementById('wa-endpoint').value.trim();

    const payload = {
      id: 1,
      whatsapp_enabled,
      whatsapp_method,
      whatsapp_endpoint,
      updated_at: new Date().toISOString()
    };

    const { error } = await db.from('app_settings').upsert(payload);
    if (error) throw error;

    appSettings = payload;
    toast('تم حفظ إعدادات واتساب ✓');
    await renderTab();
  } catch (e) {
    console.error(e);
    toast('فشل حفظ إعدادات واتساب', 'error');
  }
}

async function testWA(){
  const samplePhone = document.getElementById('wa-test-phone')?.value.trim();
  if (!samplePhone) {
    toast('اكتب رقم للتجربة', 'error');
    return;
  }
  const ok = await queueWA(samplePhone, 'رسالة تجريبية من لوحة التحكم ✨', 'settings_test');
  if (ok) toast('تم تنفيذ تجربة الإرسال ✓');
}

async function queueWA(phone, message, source = 'manual'){
  try {
    phone = normalizePhone(phone);

    if (!appSettings.whatsapp_enabled) {
      toast('واتساب متوقف من الإعدادات', 'error');
      return false;
    }

    // الخيار الأفضل: Queue عبر قاعدة البيانات
    if (appSettings.whatsapp_method === 'queue') {
      const { data: customerData } = await db
        .from('customers')
        .select('*')
        .in('phone', [
          phone,
          phone.replace(/^0/, '966'),
          phone.replace(/^0/, ''),
          '+' + phone.replace(/^0/, '966')
        ])
        .limit(1);

      const customer = customerData?.[0] || null;

      const payload = {
        phone,
        customer_name: customer?.name || null,
        message,
        type: 'whatsapp',
        status: 'pending',
        source,
        customer_phone: phone,
        branch: customer?.branch || currentBranch || null
      };

      const { error } = await db.from('outbox_messages').insert([payload]);
      if (error) throw error;

      toast('تمت إضافة الرسالة للطابور ✓');
      return true;
    }

    // API خارجي أو Edge Function
    if (appSettings.whatsapp_method === 'api') {
      if (!appSettings.whatsapp_endpoint) {
        toast('أضف Endpoint في إعدادات واتساب', 'error');
        return false;
      }

      const res = await fetch(appSettings.whatsapp_endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, message, source })
      });

      const text = await res.text();

      if (!res.ok) {
        throw new Error(text || 'فشل الإرسال عبر API');
      }

      try {
        await db.from('outbox_messages').insert([{
          phone,
          customer_name: null,
          message,
          type: 'whatsapp',
          status: 'sent',
          source,
          customer_phone: phone,
          branch: currentBranch || null
        }]);
      } catch(e) {
        console.warn('outbox log warning', e);
      }

      toast('تم إرسال الرسالة عبر API ✓');
      return true;
    }

    toast('طريقة إرسال غير معروفة', 'error');
    return false;

  } catch (e) {
    console.error(e);

    try {
      await db.from('outbox_messages').insert([{
        phone: normalizePhone(phone),
        customer_name: null,
        message,
        type: 'whatsapp',
        status: 'failed',
        source,
        customer_phone: normalizePhone(phone),
        branch: currentBranch || null,
        error_message: e.message || 'Unknown error'
      }]);
    } catch(err) {
      console.warn('failed log warning', err);
    }

    toast('فشل إرسال/حفظ الرسالة', 'error');
    return false;
  }
}

async function loginEmployee(){
  const name = document.getElementById('emp-login-name').value.trim();
  const pin = document.getElementById('emp-login-pin').value.trim();

  const { data, error } = await db
    .from('employees')

async function getShopName(){
  const { data } = await db.from('shop_settings').select('*').limit(1);
  return data && data.length && data[0].shop_name ? data[0].shop_name : "متجر الولاء";
}

async function getBranchCusts(branch){
  let query = db.from('customers').select('*');
  if (branch) query = query.eq('branch', branch);
  const { data, error } = await query;
  if (error) return [];
  return (data || []).map(normalizeCustomer);
}

async function getAllEmployees(){
  const { data, error } = await db.from('employees').select('*').order('created_at', { ascending: false });
  if (error) return [];
  return data || [];
}

async function getNotifs(){
  const { data, error } = await db.from('loyalty_notifications').select('*').order('created_at', { ascending: false }).limit(20);
  if (error) return [];
  return data || [];
}

async function getOutboxStats(){
  try {
    const { data, error } = await db.from('outbox_messages').select('*').order('created_at', { ascending: false }).limit(50);
    if (error) throw error;

    const rows = data || [];
    return {
      all: rows,
      pending: rows.filter(x => x.status === 'pending').length,
      sent: rows.filter(x => x.status === 'sent').length,
      failed: rows.filter(x => x.status === 'failed').length
    };
  } catch (e) {
    console.error(e);
    return { all: [], pending: 0, sent: 0, failed: 0 };
  }
}
